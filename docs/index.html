<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ClaudeWatch</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Claude Code plugin for command safety rules">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'ClaudeWatch',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      coverpage: false,
      notFoundPage: true,
      relativePath: false,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      hideSidebar: false,
      search: {
        placeholder: 'Search...',
        noData: 'No results',
        paths: 'auto'
      },
      'flexible-alerts': {
        style: 'callout',
      },
    }
  </script>
  <script src="https://chris-peterson.github.io/js/docsify-shared.js"></script>
  <script>
    initProject({
      name: 'ClaudeWatch',
      code_languages: ['bash', 'yaml', 'python']
    });
  </script>
</body>
</html>
